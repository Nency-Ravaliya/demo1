<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Cloud Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            text-align: center;
        }
        .container {
            padding: 100px 20px;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        p {
            font-size: 20px;
        }
        .box {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: inline-block;
        }
        .footer {
            margin-top: 50px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>My First Cloud Website</h1>
        <p>This website is deployed on AWS EC2 using Nginx</p>

        <div class="box">
            <p>Server Status: Running</p>
            <p>Deployment: Successful</p>
        </div>

        <div class="footer">
            <p>Created by Yatri Cloud Workshop</p>
        </div>
    </div>

</body>
</html>
